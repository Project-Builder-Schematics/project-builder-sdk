  - "RESOLVED BY ORCHESTRATOR (owner direction obs #2070): Reading A — defineFactory is REMOVED from ./testing exports (breaking removal, installed-consumer.e2e.test.ts:249 inverts to false). Not additive sugar."
  - "Opt-out tier relocation is the riskiest semantic: runFactoryForTest without packageDir = untyped run byte-for-byte as today; with packageDir = schema-validated; runner always supplies it. Spec must pin explicitly."
  - "Sanctioned-caller fitness guard for defineFactory (testing/, conformance/, bin/ only) is MANDATORY (architect halt condition)"
  - "dts-baseline regen must pair with a positive assertion on the new runFactoryForTest signature (removal-only gate launders bugs)"
  - "Add runFactoryForTest-through packageDir validation test (mutation leak: validation silently off passes entire suite today)"
  - "Already-wrapped-runner scenario + non-function export scenario required in spec (new failure modes)"
  - "Corpus: ~21-30 wrap sites in test/fixtures/author-emulation/factory.ts + scratchFactoryRunner; regen via scripts/regen-corpus.ts must be byte-identical (FIT-28); tighten scenarios.ts FactoryRunner any-type"
  - "Docs: quickstart/README machine-compiled snippets migrate in lockstep; authoring-verbs.md:78 + authoring-errors.md prose mentions tracked explicitly (not compile-enforced)"
  - "File count ~30 (not 13-15); recommend 6-7 slices; export removal as final separate slice; walking skeleton = signature + 1 opted-in + 1 untyped fixture + 1 doc snippet + dts regen"
  - "Spikes first: harness-opted-in canary end-to-end (anchor relocation oracle) + one corpus scenario byte-identity"
