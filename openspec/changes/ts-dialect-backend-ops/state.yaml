# Owner decisions RATIFIED 2026-07-18 (all four resolved; propose unblocked):
ratified_decisions:
  - id: a
    ruling: FOLD IN — identifier validation (pending row 22) enters this change's scope,
      covering the `name` params of ALL ops (7 new + 5 existing). Injection CONFIRMED vs
      ts-morph@28; 4th deferral rejected.
  - id: b
    ruling: SEPARATE STATEMENT — addTypeImport always emits its own `import type { X } from 'm'`
      declaration; never merges inline `{ type X }` into an existing value import.
  - id: c
    ruling: NAMED RE-EXPORTS ONLY — removeExport targets `export { x } from 'm'` (name+module,
      mirror of removeImport). Add/remove asymmetry ACCEPTED for v1; documented explicitly and
      missing remove counterparts registered as pending followups.
  - id: d
    ruling: NO `as ns` — addExportAll covers `export * from 'm'` only (module-only idempotency
      identity, no collision surface). `export * as ns` deferred to pending with the
      value-binding note.
  # Second ratification round — 2026-07-18, from spec V1 council review (council-spec-v1.md):
  - id: e
    ruling: AMENDS (b)'s consequence — addTypeImport is a NO-OP when a same-name VALUE import of
      the same module exists (value import already provides the type meaning). Ruling (b) itself
      stands for the emitting case. Fixes QA C1 (probe-verified TS2300).
  - id: f
    ruling: addVariable.kind gets RUNTIME validation vs the exact const|let|var allow-list, same
      branded dialectError. Closes the sibling raw splice (ops.ts:114) security found.
  - id: g
    ruling: TIV grammar = ASCII-only ^[A-Za-z_$][A-Za-z0-9_$]*$ + reserved words REJECTED +
      \u escapes and non-ASCII REJECTED. Unicode identifiers = pending followup.
  - id: h
    ruling: aliased export specifiers match by SOURCE name (removeImport mirror); visible-alias
      side documented non-match. Applies to removeExport targeting + addReExport identity.

