  - >
    RESOLVED 2026-07-17 by diagnostic. Full-suite instability is
    ENVIRONMENTAL — not a regression, and NOT parallelism. The
    parallel-execution hypothesis is refuted at the root: bun test is
    sequential by default and package.json:64 runs a bare `bun test` with no
    flags, so nothing was ever parallel. Control experiment settles the
    regression question: HEAD's exact code (6ee9af0) checked out into
    /private/tmp yields 1779 pass / 0 fail across 3/3 runs (~23s). Therefore
    apply-progress.md's "1779 passing / 0 failing" claim is truthful and
    exactly reproducible — just not under ~/Documents. Mechanism:
    subprocess-bound tests (bun install / bun link / tsc --noEmit via
    blocking spawnSync) run against bun's default 5000ms timeout, while
    first-touch file scanning under ~/Documents inflates the first
    `tsc --noEmit` from 663ms to 16694ms (26x). tsc --extendedDiagnostics
    proves the work is identical on both sides (256 files / 48335 symbols /
    556 types), so it is not ts-morph, not the type graph, and not the react
    dialect. Strong inference: Microsoft Defender (wdavdaemon) real-time
    scan — NOT A/B-proven, as a corporate EDR cannot be disabled to confirm.
    Ruled out: parallelism, regression, ts-morph/type-graph growth,
    dist/testing/commons d.ts drift, core AST leakage (FIT-37 holds), iCloud
    sync, port binding, process.cwd() mutation. No shared-state defect exists.
  - >
    OPEN — pre-existing test debt, explicitly NOT react-dialect scope:
    subprocess-bound tests declare no explicit timeout
    (test/docs/quickstart-docs.test.ts:312 and :319, the S-03
    permissive-proof CI guard, the installed-consumer-vantage e2e leg).
    Their measured work is ~2s even on a fast filesystem against a 5000ms
    budget — the declared budget does not describe the work, Defender or not.
    Fix = explicit per-test timeouts (~30 min), NOT a raised global timeout
    (that would mask genuinely slow tests everywhere). Environment-level
    companion, not committed: a Defender real-time-scan exclusion for the
    repo, or at minimum for .tmp-*/ scratch dirs.
