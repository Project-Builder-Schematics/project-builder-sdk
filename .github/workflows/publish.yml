name: Publish (dev prerelease)

# Runs ONLY on push to main — not on pull_request, not on workflow_dispatch from forks.
# Fork PRs can never trigger this job and never see the id-token permission.
on:
  push:
    branches:
      - main

# contents: read is the workflow-level default. id-token: write lives ONLY on the `publish`
# job's own permissions block below (least privilege, ADR-0042 decision #1) — a job-level
# `permissions` block replaces the workflow default for that job, so `publish` restates
# `contents: read` alongside it.
permissions:
  contents: read

jobs:
  publish:
    name: Publish dev prerelease
    runs-on: ubuntu-latest

    # W3 repo-owner guard (REQ-PPH-01, ADR-0042): a fork's push runs under the fork's own
    # OIDC identity, which npm trusted publishing does not trust for @pbuilder/sdk — this
    # guard stops OIDC token minting inside forks before it ever reaches the publish step.
    if: github.repository == 'Project-Builder-Schematics/project-builder-sdk'

    # id-token: write is required for npm trusted publishing (OIDC provenance).
    # No NPM_TOKEN secret is used — the registry validates identity via the OIDC token.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Compute the short SHA (7 chars) and stamp it into the version field.
      # The version is 0.0.0-dev.<short-sha> on the `dev` dist-tag.
      - name: Set dev version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          npm version "0.0.0-dev.${SHORT_SHA}" --no-git-tag-version

      # Publish dry-run with provenance assertion.
      #
      # WHY dry-run: npm trusted publishing (OIDC) is a registry-side precondition —
      # the npm team must configure the package to trust this repository's GitHub
      # Actions OIDC issuer before a live publish will succeed.  Until that is done,
      # the dry-run validates the workflow config (version, dist-tag, provenance flag)
      # without touching the registry.
      #
      # TO ENABLE LIVE PUBLISH: once npm trusted-publishing is configured for
      # @pbuilder/sdk in the npmjs.com package settings, remove `--dry-run` from
      # the command below.  Everything else (OIDC, provenance, dist-tag) stays the
      # same.
      - name: Publish (dry-run — awaiting registry trust)
        run: npm publish --tag dev --provenance --access public --dry-run
