name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

# No id-token permission here — fork PRs must never have publish credentials.
permissions:
  contents: read

jobs:
  ci:
    name: Test, typecheck, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Typecheck (strict)
        run: bun run typecheck

      # The permissive-proof negative type matrix is now guarded by a real `bun test`
      # (test/types/permissive-proof.guard.test.ts), which pins the exact expected tsc
      # diagnostics by error code + directive region — strictly stronger than the old
      # inverted-exit step (which was blind to WHICH negative held). It runs above under
      # `bun test`, so no separate CI step is needed here.
