name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

# No id-token permission here — fork PRs must never have publish credentials.
permissions:
  contents: read

jobs:
  ci:
    name: Test, typecheck, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Typecheck (strict)
        run: bun run typecheck

      - name: Build
        run: bun run build

      # The permissive-proof tsconfig is EXPECTED to exit non-zero (TS2578 errors
      # are its success signal). Invert the exit code so CI fails when the proof
      # does NOT error — a zero exit here means the type constraints were lost.
      - name: Permissive-proof (must fail)
        run: |
          if bun run typecheck:permissive-proof; then
            echo "ERROR: typecheck:permissive-proof exited 0 — the negative type proofs are no longer failing as required."
            exit 1
          fi
          echo "OK: typecheck:permissive-proof exited non-zero as expected."
